    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <style>
      html {
        scroll-behavior: smooth;
      }
      body {
        font-family: 'Figtree', sans-serif;
        color: #000;
        overflow-x: hidden;
        /* Replicating the vibe of the provided background image with a CSS mesh gradient */
        background-color: #080808;
        background-image:
          radial-gradient(at 0% 0%, hsla(43,80%,45%,0.4) 0, transparent 50%),
          radial-gradient(at 50% 0%, hsla(36,70%,30%,0.3) 0, transparent 50%),
          radial-gradient(at 100% 0%, hsla(30,60%,25%,0.3) 0, transparent 50%),
          radial-gradient(at 0% 50%, hsla(45,90%,50%,0.15) 0, transparent 50%),
          radial-gradient(at 100% 50%, hsla(38,80%,35%,0.2) 0, transparent 50%),
          radial-gradient(at 0% 100%, hsla(30,50%,20%,0.3) 0, transparent 50%),
          radial-gradient(at 50% 100%, hsla(43,70%,40%,0.2) 0, transparent 50%),
          radial-gradient(at 100% 100%, hsla(45,80%,45%,0.3) 0, transparent 50%);
        background-attachment: fixed;
        background-size: cover;
      }
      .glass-card {
        background: rgba(20, 18, 12, 0.75);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        border: 1px solid rgba(212, 175, 55, 0.15);
      }
      .glass-card-dark {
        background: rgba(0, 0, 0, 0.8);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        border: 1px solid rgba(212, 175, 55, 0.15);
      }
      .text-italics {
        font-style: italic;
        font-weight: 300;
      }
      .marquee-container {
        display: flex;
        overflow: hidden;
        user-select: none;
        gap: 2rem;
      }
      .marquee-content {
        flex-shrink: 0;
        display: flex;
        justify-content: space-around;
        gap: 2rem;
        min-width: 100%;
        animation: scroll 40s linear infinite;
      }
      @keyframes scroll {
        from { transform: translateX(0); }
        to { transform: translateX(calc(-100% - 2rem)); }
      }
      @keyframes popIn {
        0% { opacity: 0; transform: scale(0.5) translateY(10px); }
        70% { transform: scale(1.05) translateY(-2px); }
        100% { opacity: 1; transform: scale(1) translateY(0); }
      }
      .grid-line {
        position: fixed;
        top: 0;
        bottom: 0;
        width: 1px;
        background-color: rgba(255,255,255,0.1);
        z-index: -1;
      }
      .grid-line-left { left: 5%; }
      .grid-line-right { right: 5%; }
      
      .reveal {
        opacity: 0;
        transform: translateY(20px);
        transition: all 0.8s ease-out;
      }
      .reveal.active {
        opacity: 1;
        transform: translateY(0);
      }
      
      @media (max-width: 1024px) {
        .grid-line { display: none; }
      }
    </style>
